services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tubedex
      POSTGRES_PASSWORD: tubedex
      POSTGRES_DB: tubedex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubedex"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tubedex:tubedex@db:5432/tubedex?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: http://localhost:8080/api/v1/auth/callback
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      APP_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  pgdata:
